<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외교 언어 분석 — 강의 슬라이드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Lato:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. THE SETUP */
        * { box-sizing: border-box; }
        body {
            background-color: #1a1c22;
            display: grid;
            gap: 40px;
            grid-template-columns: 1fr;
            margin: 0;
            padding: 40px 0;
            place-items: center;
            font-family: 'Lato', 'Nanum Gothic', sans-serif;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #0a0e14;
            color: #ffffff;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Abstract Background Decoration */
        .slide-container::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .slide-container::after {
            content: '';
            position: absolute;
            bottom: 50px;
            left: 60px;
            width: 100px;
            height: 4px;
            background-color: #00f2ff;
        }

        /* Typography */
        h1, h2, h3 { font-family: 'Poppins', sans-serif; margin: 0; }
        .slide-title {
            font-size: 44px;
            color: #ffffff;
            margin-bottom: 30px;
            border-left: 6px solid #00f2ff;
            padding-left: 20px;
            z-index: 1;
            max-width: 1100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        p, li, td, th { font-size: 20px; color: #b0b0b0; line-height: 1.6; }
        strong { color: #00f2ff; }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            z-index: 1;
            gap: 20px;
        }

        /* Layouts */
        .title-layout { text-align: center; align-items: center; justify-content: center; height: 100%; }
        .title-layout h1 { font-size: 80px; margin-bottom: 20px; color: #00f2ff; }
        .title-layout .subtitle { font-size: 28px; color: #ffffff; margin-top: 20px; }

        .section-title-layout { text-align: center; justify-content: center; height: 100%; }
        .section-title-layout h2 { font-size: 64px; color: #ffffff; }
        .section-title-layout hr { width: 120px; border: 2px solid #00f2ff; margin: 30px auto; }

        .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        .tiled-content { display: flex; gap: 30px; width: 100%; }
        .tile { 
            flex: 1; background: #151a21; padding: 40px; border-radius: 15px; 
            border-bottom: 4px solid #00f2ff; text-align: center;
        }
        .tile .icon { font-size: 50px; color: #adff2f; margin-bottom: 20px; }
        .tile h3 { font-size: 24px; color: #ffffff; margin-bottom: 15px; }

        .image-wrapper { 
            width: 100%; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333; 
            background: #151a21;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .bullet-list { list-style: none; padding: 0; }
        .bullet-list li { position: relative; padding-left: 40px; margin-bottom: 20px; }
        .bullet-list i { position: absolute; left: 0; top: 5px; color: #00f2ff; font-size: 22px; }

        .table-layout table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table-layout th { background: #151a21; color: #00f2ff; text-align: left; padding: 20px; border-bottom: 2px solid #333; }
        .table-layout td { padding: 20px; border-bottom: 1px solid #222; color: #ffffff; }

        /* Formula Container */
        #formula-container { background: #000; padding: 25px; border-radius: 10px; border-left: 4px solid #adff2f; display: inline-block; }

        /* Bleed Image Right Custom */
        .bleed-image-layout { padding: 0; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: start; }
        .bleed-image-layout .content-container { padding: 60px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .bleed-image-layout .image-container { width: 100%; height: 720px; background: #151a21; }
        .bleed-image-layout img { width: 100%; height: 720px; object-fit: cover; }

        /* Code Block (초심자 슬라이드용) */
        .code-block {
            background: #000;
            padding: 30px 35px;
            border-radius: 10px;
            border-left: 4px solid #adff2f;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            line-height: 1.8;
            color: #e0e0e0;
            white-space: pre-wrap;
        }
        .code-block .kw { color: #ff79c6; }       /* 키워드 */
        .code-block .fn { color: #50fa7b; }       /* 함수 */
        .code-block .str { color: #f1fa8c; }      /* 문자열 */
        .code-block .num { color: #bd93f9; }      /* 숫자 */
        .code-block .cm  { color: #6272a4; font-style: italic; } /* 주석 */
        .code-block .var { color: #8be9fd; }      /* 변수 */

        /* 2열 스텝 카드 (Colab 조작용) */
        .step-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .step-card {
            background: #151a21;
            padding: 22px 26px;
            border-radius: 12px;
            border-left: 4px solid #00f2ff;
        }
        .step-card h4 {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            color: #00f2ff;
            margin: 0 0 8px 0;
        }
        .step-card p { font-size: 16px; margin: 0; color: #cfcfcf; }
        .step-card code {
            background: #000;
            color: #adff2f;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 15px;
        }

        /* 슬라이드 번호 + 푸터 (program4 추가) */
        .slide-no { position:absolute; bottom:24px; right:32px; font-size:14px; color:#3a4250; letter-spacing:1px; z-index:2; }
        .kicker { color:#00f2ff; letter-spacing:3px; font-size:15px; font-weight:700; margin-bottom:12px; }
        .src-tag { display:inline-block; background:#151a21; color:#adff2f; padding:3px 10px; border-radius:6px; font-size:14px; margin-right:6px; }
        .finding { background:#101820; border-left:4px solid #adff2f; padding:18px 24px; border-radius:8px; }
        .finding b { color:#adff2f; }
    </style>
</head>
<body>
<!-- SLIDES HERE -->
</body>
</html>
